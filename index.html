<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding System — מעבדת הקרב</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body dir="rtl">

<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar" id="topbar">
    <button class="tb-back" id="tb-back" onclick="backHome()" style="display:none">← ניסויים</button>
    <span class="tl" id="tb-label">ניסוי:</span><span class="tv" id="tb-name">איום אווירי 2026-A</span>
    <span class="tsep" id="tb-sep">|</span>
    <span class="tl" id="tb-goal-label">מטרה:</span><span class="tv blue" id="tb-goal">גילוי ותקיפה</span>
    <div class="tdots">
      <div class="sdot" id="sd1"></div>
      <div class="sdot" id="sd2"></div>
      <div class="sdot" id="sd3"></div>
    </div>
  </div>

  <!-- HOME VIEW -->
  <div id="home-view" style="display:none">
    <div class="home-wrap">
      <div class="home-hero">
        <div class="home-brand">
          <div class="home-brand-icon">⚔</div>
          <div>
            <div class="home-title">מעבדת הקרב</div>
            <div class="home-subtitle">מערכת Onboarding</div>
          </div>
        </div>
        <button class="btn-new-trial" onclick="openPopNewTrial()">
          <span class="btn-nt-plus">+</span> צור ניסוי חדש
        </button>
      </div>
      <div class="home-list-hd">
        <div class="home-list-title" id="trials-count-label">ניסויים</div>
        <button class="btn-clone-trial" id="btn-clone-trial" onclick="openPopDuplicateTrial()">⧉ שכפל ניסוי קיים</button>
      </div>
      <div class="trials-list" id="trials-list"></div>
    </div>
  </div>

  <!-- TRIAL VIEW TABS -->
  <div class="view-tabs" id="view-tabs" style="display:none">
    <div class="vtab active" id="tab-pm" onclick="switchTab('pm')">לקוח / מנהל מוצר</div>
    <div class="vtab" id="tab-dev" onclick="switchTab('dev')">פיתוח</div>
  </div>

  <!-- PM VIEW -->
  <div id="pm-view" style="display:none">
    <div id="pm-grid-wrap">
      <div class="grid-wrap">
        <div class="grid">
          <div class="col">
            <div class="col-head"><div class="col-step">שלב 1</div><div class="col-title">קטגוריה</div></div>
            <div class="col-body" id="c-cat"></div>
            <div class="add-row" onclick="openPop('cat')"><span class="plus">+</span> קטגוריה</div>
          </div>
          <div class="col">
            <div class="col-head"><div class="col-step">שלב 2</div><div class="col-title">אפליקציה</div></div>
            <div class="app-search-wrap"><input class="app-search" id="app-search" type="text" placeholder="חיפוש אפליקציה..." oninput="rApp()"></div>
            <div class="col-body" id="c-app"></div>
            <div class="add-row" onclick="openPop('app')"><span class="plus">+</span> הוסף אפליקציה</div>
          </div>
          <div class="col">
            <div class="col-head"><div class="col-step">שלב 3</div><div class="col-title">יכולות</div></div>
            <div class="col-body" id="c-cap"></div>
            <div class="col-action">
              <button class="btn-pri" id="gen-receipt-btn" onclick="showReceipt()" disabled>צור קבלה ↗</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="receipt" id="receipt"></div>

    <div id="receipt-bar" style="display:none" class="bottom-bar">
      <button class="btn-sec" onclick="backToSelection()">חזור לבחירה ←</button>
      <button class="btn-pri" onclick="sendToDev()">שלח לפיתוח ↗</button>
    </div>
  </div>

  <!-- DEV VIEW -->
  <div id="dev-view" style="display:none">
    <div class="dev-wrap">
      <div class="dev-hd">
        <div class="dev-hd-text">
          <div class="dev-title" id="dev-title">קבלת פיתוח</div>
          <div class="dev-meta" id="dev-meta">ממתין לשליחה מהלקוח</div>
        </div>
        <span class="dev-stamp" id="dev-stamp">טיוטה</span>
      </div>
      <div class="dev-grid-wrap">
        <div class="dev-grid" id="dev-grid" dir="rtl"></div>
      </div>
      <div class="dev-legend">
        <div class="leg"><div class="leg-dot" style="background:#3B6D11"></div>קיים</div>
        <div class="leg"><div class="leg-dot" style="background:#BA7517"></div>דורש התאמה</div>
        <div class="leg"><div class="leg-dot" style="background:#A32D2D"></div>דורש פיתוח</div>
      </div>
    </div>
  </div>

</div>

<!-- Right-click context menu -->
<div class="ctxm" id="ctxm" dir="rtl">
  <div class="ctxm-i" id="cm-edit">✎  שנה שם</div>
  <div class="ctxm-sep"></div>
  <div class="ctxm-i danger" id="cm-del">✕  מחק</div>
</div>

<!-- Popup -->
<div class="ov h" id="ov">
  <div class="popup">
    <div class="pop-t" id="pop-title">הוסף</div>
    <div id="pop-body"></div>
    <div class="pop-acts">
      <button class="pop-ok" onclick="confirmPop()">הוסף</button>
      <button class="pop-cancel" onclick="closePop()">ביטול</button>
    </div>
  </div>
</div>

<script src="src/data.js"></script>
<script src="src/app.js"></script>
</body>
</html>
